[phases.setup]
nixPkgs = ["nodejs_22", "pkg-config", "cairo", "pango", "libpng", "libjpeg", "giflib", "librsvg", "pixman", "libuuid"]
aptPkgs = ["build-essential", "libcairo2-dev", "libpango1.0-dev", "libjpeg-dev", "libgif-dev", "librsvg2-dev", "libuuid1"]

[phases.install]
cmds = ["npm ci"]

[start]
cmd = "npm start"
